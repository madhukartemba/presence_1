# Minimal ESP32-C6 hub using modular `EspClickHub` (no LED strip).
# Copy this folder beside `esp_click_espnow_hub/` as in this repo, or adjust `includes` paths.
substitutions:
  device_id: 0

esphome:
  name: esp-click-c6-receiver-${device_id}
  friendly_name: ESP Click C6 Receiver ${device_id}
  includes:
    - ../esp_click_espnow_hub/esp_click_hub.h
    - esp_now_connector.h
  platformio_options:
    lib_deps:
      - bblanchon/ArduinoJson@6.21.3

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf
    sdkconfig_options:
      # Work around ESP-IDF mbedTLS GCM alt-linking mismatch on C6 builds.
      # Using software AES restores standard mbedtls_gcm_* symbols.
      CONFIG_MBEDTLS_HARDWARE_AES: "n"

logger:
  level: DEBUG

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

mqtt:
  broker: homeassistant.local
  username: !secret mqtt_username
  password: !secret mqtt_password
  discovery: false
  on_connect:
    - lambda: |-
        mqtt_ensure_device_sync_subscription();

espnow:
  auto_add_peer: true
  on_broadcast:
    then:
      - lambda: |-
          handle_espnow_packet(info.src_addr, data, size);
  on_receive:
    then:
      - lambda: |-
          handle_espnow_packet(info.src_addr, data, size);

# ====================
# STATUS LED (single WS2812 NeoPixel on GPIO18)
# ====================
light:
  - platform: esp32_rmt_led_strip
    name: "Status LED"
    id: status_led
    pin: GPIO18
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    default_transition_length: 0s
    gamma_correct: 2.8
    restore_mode: ALWAYS_OFF
    effects:
      - pulse:
          name: "Pairing Pulse"
          transition_length:
            on_length: 1500ms
            off_length: 1500ms
          min_brightness: 0%
          max_brightness: 100%
          update_interval: 1500ms

interval:
  - interval: 50ms
    then:
      - if:
          condition:
            lambda: return g_request_close_pairing_mode && pairing_mode_active;
          then:
            - lambda: |-
                g_request_close_pairing_mode = false;
            - switch.turn_off: pairing_mode_switch

# ====================
# SCRIPTS
# ====================
script:
  - id: pairing_mode_timer
    mode: restart
    then:
      - switch.turn_on: pairing_mode_switch
      - logger.log: "Pairing mode activated. Waiting for devices..."
      - delay: 60s
      - switch.turn_off: pairing_mode_switch
      - logger.log: "Pairing mode timed out and closed."

  # One-shot color flash with smooth fade-in / fade-out.
  # Resumes the magenta pairing pulse if pairing mode is still active when the flash ends.
  - id: flash_color
    mode: restart
    parameters:
      r: float
      g: float
      b: float
    then:
      - light.turn_on:
          id: status_led
          red: !lambda 'return r;'
          green: !lambda 'return g;'
          blue: !lambda 'return b;'
          brightness: 100%
          transition_length: 220ms
      - delay: 260ms
      - light.turn_off:
          id: status_led
          transition_length: 700ms
      - delay: 720ms
      - if:
          condition:
            switch.is_on: pairing_mode_switch
          then:
            - light.turn_on:
                id: status_led
                red: 1.0
                green: 0.0
                blue: 1.0
                brightness: 100%
                effect: "Pairing Pulse"

# ====================
# EVENT ENTITY
# ====================
event:
  - platform: template
    name: "Button"
    id: button_event
    device_class: button
    event_types:
      - single_press
      - double_press
      - long_press

switch:
  - platform: template
    name: "ESP-NOW Pairing Mode"
    id: pairing_mode_switch
    icon: mdi:bluetooth-connect
    optimistic: true
    turn_on_action:
      - lambda: |-
          pairing_mode_active = true;
      - light.turn_on:
          id: status_led
          red: 1.0
          green: 0.0
          blue: 1.0
          brightness: 100%
          effect: "Pairing Pulse"
    turn_off_action:
      - lambda: |-
          pairing_mode_active = false;
      - script.stop: pairing_mode_timer
      - light.turn_off:
          id: status_led
          transition_length: 0s
      - if:
          condition:
            lambda: return !g_pairing_close_skip_red_led;
          then:
            - script.execute:
                id: flash_color
                r: 1.0
                g: 0.0
                b: 0.0
      - lambda: |-
          g_pairing_close_skip_red_led = false;

button:
  - platform: template
    name: "Clear All Paired Devices"
    id: clear_macs_button
    icon: mdi:delete-sweep
    entity_category: config
    on_press:
      - lambda: |-
          #ifdef USE_MQTT
          clear_all_paired_devices_mqtt();
          #endif

# ====================
# PUSH BUTTON (GPIO2)
# ====================
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO2
      mode: INPUT_PULLUP
      inverted: true
    internal: true
    name: "Push Button"
    on_multi_click:
      # Triple press → toggle ESP-NOW pairing mode
      - timing:
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for at least 200ms
        then:
          - if:
              condition:
                switch.is_off: pairing_mode_switch
              then:
                - script.execute: pairing_mode_timer
              else:
                - switch.turn_off: pairing_mode_switch

      # Double press → fire HA event + yellow flash
      - timing:
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for at least 200ms
        then:
          - event.trigger:
              id: button_event
              event_type: double_press
          - script.execute:
              id: flash_color
              r: 1.0
              g: 1.0
              b: 0.0
          - logger.log: "Event Fired: Double Press"

      # Single press → fire HA event + white flash
      - timing:
          - ON for 50ms to 350ms
          - OFF for at least 200ms
        then:
          - event.trigger:
              id: button_event
              event_type: single_press
          - script.execute:
              id: flash_color
              r: 1.0
              g: 1.0
              b: 1.0
          - logger.log: "Event Fired: Single Press"

      # Long press → fire HA event + blue flash
      - timing:
          - ON for at least 500ms
        then:
          - event.trigger:
              id: button_event
              event_type: long_press
          - script.execute:
              id: flash_color
              r: 0.0
              g: 0.0
              b: 1.0
          - logger.log: "Event Fired: Long Press"
