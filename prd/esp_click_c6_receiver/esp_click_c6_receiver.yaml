# Minimal ESP32-C6 hub using modular `EspClickHub` (no LED strip).
# Copy this folder beside `esp_click_espnow_hub/` as in this repo, or adjust `includes` paths.
substitutions:
  device_id: 0

esphome:
  name: esp-click-c6-receiver-${device_id}
  friendly_name: ESP Click C6 Receiver ${device_id}
  includes:
    - ../esp_click_espnow_hub/esp_click_hub.h
    - esp_now_connector.h
  platformio_options:
    lib_deps:
      - bblanchon/ArduinoJson@6.21.3
  on_boot:
    - priority: 600
      then:
        - script.execute: play_boot

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf
    sdkconfig_options:
      # Work around ESP-IDF mbedTLS GCM alt-linking mismatch on C6 builds.
      # Using software AES restores standard mbedtls_gcm_* symbols.
      CONFIG_MBEDTLS_HARDWARE_AES: "n"

logger:
  level: DEBUG

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  on_connect:
    then:
      - script.stop: play_wifi_connecting
      - script.execute: play_wifi_connected
  on_disconnect:
    then:
      - script.execute: play_wifi_connecting

mqtt:
  broker: homeassistant.local
  username: !secret mqtt_username
  password: !secret mqtt_password
  discovery: false
  on_connect:
    - lambda: |-
        mqtt_ensure_device_sync_subscription();

espnow:
  auto_add_peer: true
  on_broadcast:
    then:
      - lambda: |-
          handle_espnow_packet(info.src_addr, data, size);
  on_receive:
    then:
      - lambda: |-
          handle_espnow_packet(info.src_addr, data, size);

# ====================
# STATUS LED (single WS2812 NeoPixel on GPIO18) — internal-only
# ====================
light:
  - platform: esp32_rmt_led_strip
    name: "Status LED"
    id: status_led
    pin: GPIO18
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    internal: true
    default_transition_length: 0s
    # Linear gamma to avoid quantization stutter at the tail of fade-outs:
    # with gamma 2.8, ~30% of the brightness slider maps to physical 0 or 1
    # on an 8-bit WS2812, which makes the LED dwell at "1/255" before snapping
    # off. Linear keeps the steps even.
    gamma_correct: 1.0
    restore_mode: ALWAYS_OFF
    effects:
      # Slow breathing reused for pairing mode (magenta) and wifi-connecting (blue).
      # Color is captured on effect start; this effect drives brightness only.
      # Brightness range: (max_slider * 0.20) → max_slider, smoothstepped over a
      # 3 s period. Built-in `pulse` effect doesn't accept a dynamic max, so we
      # roll our own lambda effect that reads the user's max-brightness slider.
      - lambda:
          name: "Status Pulse"
          update_interval: 30ms
          lambda: |-
            static uint32_t cycle_start_ms = 0;
            if (initial_run) {
              cycle_start_ms = millis();
            }
            const uint32_t period_ms = 3000;
            const float t = (float)((millis() - cycle_start_ms) % period_ms) /
                            (float)period_ms;
            const float w = (t < 0.5f) ? (t * 2.0f) : (2.0f * (1.0f - t));
            const float s = w * w * (3.0f - 2.0f * w);
            const float max_b = id(led_max_brightness_pct).state / 100.0f;
            const float min_b = 0.20f * max_b;
            const float br = min_b + (max_b - min_b) * s;
            auto call = id(status_led).turn_on();
            call.set_transition_length(0);
            call.set_brightness(br);
            call.set_publish(false);
            call.set_save(false);
            call.perform();

interval:
  - interval: 50ms
    then:
      # Auto-close pairing mode once a device finishes pairing.
      - if:
          condition:
            lambda: return g_request_close_pairing_mode && pairing_mode_active;
          then:
            - lambda: |-
                g_request_close_pairing_mode = false;
            - switch.turn_off: pairing_mode_switch
      # Dispatch LED feedback requests latched from the EspClickHub callback
      # (e.g. green on successful pairing, red on unpair, white/yellow/blue on
      # remote button press). See esp_now_connector.h.
      - if:
          condition:
            lambda: 'return esp_click_led_request().pending;'
          then:
            - lambda: 'esp_click_led_request().pending = false;'
            - script.execute:
                id: flash_color
                r: !lambda 'return esp_click_led_request().r / 255.0f;'
                g: !lambda 'return esp_click_led_request().g / 255.0f;'
                b: !lambda 'return esp_click_led_request().b / 255.0f;'

# ====================
# SCRIPTS
# ====================
script:
  - id: pairing_mode_timer
    mode: restart
    then:
      - switch.turn_on: pairing_mode_switch
      - logger.log: "Pairing mode activated. Waiting for devices..."
      - delay: 60s
      - switch.turn_off: pairing_mode_switch
      - logger.log: "Pairing mode timed out and closed."

  # Boot: slow white fade-in / fade-out, then hand off to wifi-connecting pulse
  # (matches presence_1_basic boot → wifi_connecting transition).
  - id: play_boot
    mode: restart
    then:
      - light.turn_on:
          id: status_led
          red: 1.0
          green: 1.0
          blue: 1.0
          brightness: !lambda 'return id(led_max_brightness_pct).state / 100.0f;'
          transition_length: 900ms
      - delay: 950ms
      - light.turn_off:
          id: status_led
          transition_length: 700ms
      - delay: 750ms
      - if:
          condition:
            not:
              wifi.connected:
          then:
            - script.execute: play_wifi_connecting

  # Continuous blue breathing while wifi is not connected.
  - id: play_wifi_connecting
    mode: restart
    then:
      - light.turn_on:
          id: status_led
          red: 0.0
          green: 0.0
          blue: 1.0
          brightness: !lambda 'return id(led_max_brightness_pct).state / 100.0f;'
          effect: "Status Pulse"

  # One-shot green fade once wifi comes up.
  - id: play_wifi_connected
    mode: restart
    then:
      - light.turn_on:
          id: status_led
          red: 0.0
          green: 1.0
          blue: 0.0
          brightness: !lambda 'return id(led_max_brightness_pct).state / 100.0f;'
          transition_length: 700ms
      - delay: 750ms
      - light.turn_off:
          id: status_led
          transition_length: 1400ms
      - delay: 1450ms

  # Gradual one-shot color flash. Used for button feedback (white/yellow/blue),
  # remote-device feedback dispatched from the EspClickHub callback (white/yellow/
  # blue/green/red), and the red close-flash when pairing mode ends.
  # If pairing mode is still on after the flash ends we resume the magenta pulse.
  - id: flash_color
    mode: restart
    parameters:
      r: float
      g: float
      b: float
    then:
      - light.turn_on:
          id: status_led
          red: !lambda 'return r;'
          green: !lambda 'return g;'
          blue: !lambda 'return b;'
          brightness: !lambda 'return id(led_max_brightness_pct).state / 100.0f;'
          transition_length: 500ms
      - delay: 550ms
      - light.turn_off:
          id: status_led
          transition_length: 1500ms
      - delay: 1520ms
      - if:
          condition:
            switch.is_on: pairing_mode_switch
          then:
            - light.turn_on:
                id: status_led
                red: 1.0
                green: 0.0
                blue: 1.0
                brightness: !lambda 'return id(led_max_brightness_pct).state / 100.0f;'
                effect: "Status Pulse"

# ====================
# EVENT ENTITY
# ====================
event:
  - platform: template
    name: "Button"
    id: button_event
    device_class: button
    event_types:
      - single_press
      - double_press
      - long_press

# ====================
# NUMBERS (HA)
# ====================
number:
  - platform: template
    name: "Status LED Max Brightness"
    id: led_max_brightness_pct
    icon: mdi:brightness-6
    entity_category: config
    unit_of_measurement: "%"
    min_value: 5
    max_value: 100
    step: 1
    initial_value: 100
    restore_value: true
    optimistic: true
    mode: slider

switch:
  - platform: template
    name: "ESP-NOW Pairing Mode"
    id: pairing_mode_switch
    icon: mdi:bluetooth-connect
    optimistic: true
    turn_on_action:
      - lambda: |-
          pairing_mode_active = true;
      - light.turn_on:
          id: status_led
          red: 1.0
          green: 0.0
          blue: 1.0
          brightness: !lambda 'return id(led_max_brightness_pct).state / 100.0f;'
          effect: "Status Pulse"
    turn_off_action:
      - lambda: |-
          pairing_mode_active = false;
      - script.stop: pairing_mode_timer
      - light.turn_off:
          id: status_led
          transition_length: 0s
      - if:
          condition:
            lambda: return !g_pairing_close_skip_red_led;
          then:
            - script.execute:
                id: flash_color
                r: 1.0
                g: 0.0
                b: 0.0
      - lambda: |-
          g_pairing_close_skip_red_led = false;

button:
  - platform: template
    name: "Clear All Paired Devices"
    id: clear_macs_button
    icon: mdi:delete-sweep
    entity_category: config
    on_press:
      - lambda: |-
          #ifdef USE_MQTT
          clear_all_paired_devices_mqtt();
          #endif

# ====================
# PUSH BUTTON (GPIO2)
# ====================
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO2
      mode: INPUT
      inverted: false
    internal: true
    name: "Push Button"
    on_multi_click:
      # Triple press → toggle ESP-NOW pairing mode
      - timing:
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for at least 200ms
        then:
          - if:
              condition:
                switch.is_off: pairing_mode_switch
              then:
                - script.execute: pairing_mode_timer
              else:
                - switch.turn_off: pairing_mode_switch

      # Double press → fire HA event + yellow flash
      - timing:
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for at least 200ms
        then:
          - event.trigger:
              id: button_event
              event_type: double_press
          - script.execute:
              id: flash_color
              r: 1.0
              g: 1.0
              b: 0.0
          - logger.log: "Event Fired: Double Press"

      # Single press → fire HA event + white flash
      - timing:
          - ON for 50ms to 350ms
          - OFF for at least 200ms
        then:
          - event.trigger:
              id: button_event
              event_type: single_press
          - script.execute:
              id: flash_color
              r: 1.0
              g: 1.0
              b: 1.0
          - logger.log: "Event Fired: Single Press"

      # Long press → fire HA event + blue flash
      - timing:
          - ON for at least 500ms
        then:
          - event.trigger:
              id: button_event
              event_type: long_press
          - script.execute:
              id: flash_color
              r: 0.0
              g: 0.0
              b: 1.0
          - logger.log: "Event Fired: Long Press"
