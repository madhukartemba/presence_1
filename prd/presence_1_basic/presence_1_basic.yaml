esphome:
  name: presence_node_${device_id}
  friendly_name: PresenceNode_${device_id}
  includes:
    - led_engine.h
    - espnow_handler.h
  platformio_options:
    lib_deps:
      - Xylopyrographer/LiteLED@3.0.1
      - bblanchon/ArduinoJson@6.21.3 # Required to parse the MAC array
  on_boot:
    priority: 600
    then:
      - globals.set: { id: motion_enabled, value: 'true' }
      - lambda: |-
          led_init();
          led_play_boot();

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

logger:
  baud_rate: 115200

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "PresenceNode_${device_id}_Setup"
    password: ""

captive_portal:

mqtt:
  broker: homeassistant.local
  username: !secret mqtt_username
  password: !secret mqtt_password
  # 1. Fetch list on connection
  on_connect:
    - mqtt.publish:
        topic: "esp_click/request_macs"
        payload: "fetch"
  # 2. Receive and update list dynamically 
  on_json_message:
    - topic: "esp_click/allowed_macs"
      then:
        - lambda: |-
            known_macs.clear();
            
            // 1. MUST use JsonArrayConst for the variable type
            // 2. MUST cast using .as<JsonArrayConst>()
            JsonArrayConst macs = x["allowed_macs"].as<JsonArrayConst>();
            
            // 3. MUST use JsonVariantConst for the loop variable
            for (JsonVariantConst v : macs) {
              known_macs.push_back(v.as<std::string>());
            }
            
            ESP_LOGI("esp_click", "Updated allowed MACs from HA. Total devices allowed: %d", known_macs.size());


espnow:
  auto_add_peer: true
  
  on_broadcast:
    then:
      - lambda: |-
          handle_espnow_packet(info.src_addr, data, size);

  on_receive:
    then:
      - lambda: |-
          handle_espnow_packet(info.src_addr, data, size);
          
globals:
  - id: motion_enabled
    type: bool
    restore_value: no
    initial_value: 'true'

interval:
  - interval: 12ms
    then:
      - lambda: |-
          led_tick();

# --------------------
# I2C
# --------------------
i2c:
  sda: GPIO8
  scl: GPIO9
  scan: true
  frequency: 100kHz

# ====================
# EVENT ENTITY
# ====================
event:
  - platform: template
    name: "Button"
    id: button_event
    device_class: button
    event_types:
      - single_press
      - double_press
      - long_press

# ====================
# LIGHT SENSOR
# ====================
sensor:
  - platform: veml7700
    address: 0x10
    update_interval: 30s
    ambient_light:
      name: "Ambient Light (Lux)"
    full_spectrum:
      name: "Full Spectrum Light"
    infrared:
      name: "Infrared Light"
    actual_gain:
      name: "VEML7700 Gain"
    actual_integration_time:
      name: "VEML7700 Integration Time"

# ====================
# SCRIPTS
# ====================
script:
  - id: pairing_mode_timer
    mode: restart
    then:
      - switch.turn_on: pairing_mode_switch
      - logger.log: "Pairing mode activated. Waiting for devices..."
      - delay: 60s
      - switch.turn_off: pairing_mode_switch
      - logger.log: "Pairing mode timed out and closed."

  # NEW: Continuous pulsing loop for the Pairing LED
  - id: pairing_led_loop
    mode: restart
    then:
      - while:
          condition:
            switch.is_on: pairing_mode_switch
          then:
            - lambda: |-
                static const LedColor yellow = {255, 255, 0};
                led_play_reverse_center_wave(&yellow, 1);
            # Wait 2 seconds before firing the next wave (acts like a heartbeat pulse)
            - delay: 2s

# ====================
# SWITCHES
# ====================
switch:
  - platform: template
    name: "Motion Enabled"
    id: motion_enabled_switch
    lambda: |-
      return id(motion_enabled);
    turn_on_action:
      - globals.set: { id: motion_enabled, value: 'true' }
      - lambda: |-
          led_play_feedback_motion_on();
    turn_off_action:
      - globals.set: { id: motion_enabled, value: 'false' }
      - binary_sensor.template.publish:
          id: radar_presence
          state: OFF
      - lambda: |-
          led_play_feedback_motion_off();
  # ====================
  # ESP-NOW PAIRING MODE SWITCH
  # ====================
  - platform: template
    name: "ESP-NOW Pairing Mode"
    id: pairing_mode_switch
    icon: mdi:bluetooth-connect
    optimistic: true
    turn_on_action:
      - lambda: 'pairing_mode_active = true;'
      # Call the new infinite C++ animation!
      - lambda: 'led_play_pairing();'
    turn_off_action:
      - lambda: 'pairing_mode_active = false;'
      - script.stop: pairing_mode_timer
      # LED Feedback: Red wave indicates Pairing Mode is CLOSED (this overrides the infinite pairing loop)
      - lambda: |-
          static const LedColor red = {255, 0, 0};
          led_play_reverse_center_wave(&red, 1);


# ====================
# BINARY SENSORS
# ====================
binary_sensor:
  - platform: template
    id: radar_presence
    name: "Radar Presence"
    device_class: occupancy
    lambda: |-
      return id(motion_enabled) && digitalRead(7);

  # PUSH BUTTON
  - platform: gpio
    pin:
      number: GPIO3
      mode: INPUT_PULLUP
      inverted: true
    internal: true
    name: "Push Button"

    on_multi_click:
      - timing:
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for at least 200ms
        then:
          - if:
              condition:
                switch.is_off: pairing_mode_switch
              then:
                - script.execute: pairing_mode_timer
              else:
                - switch.turn_off: pairing_mode_switch
      - timing:
          - ON for 50ms to 350ms
          - OFF for at least 200ms
        then:
          - event.trigger:
              id: button_event
              event_type: single_press
          - lambda: |-
              led_play_feedback_single();
          - logger.log: "Event Fired: Single Press"

      - timing:
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
        then:
          - event.trigger:
              id: button_event
              event_type: double_press
          - lambda: |-
              led_play_feedback_double();
          - logger.log: "Event Fired: Double Press"

      - timing:
          - ON for at least 500ms
        then:
          - globals.set:
              id: motion_enabled
              value: !lambda 'return !id(motion_enabled);'
          - if:
              condition:
                lambda: 'return !id(motion_enabled);'
              then:
                - binary_sensor.template.publish:
                    id: radar_presence
                    state: OFF
          - event.trigger:
              id: button_event
              event_type: long_press
          - lambda: |-
              if (id(motion_enabled)) {
                led_play_feedback_motion_on();
              } else {
                led_play_feedback_motion_off();
              }
          - logger.log:
              format: "Motion Enabled now: %s"
              args: ['id(motion_enabled) ? "TRUE" : "FALSE"']