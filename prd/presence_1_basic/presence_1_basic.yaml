esphome:
  name: presence_node_${device_id}
  friendly_name: PresenceNode_${device_id}
  includes:
    - led_engine.h
    - espnow_handler.h
  platformio_options:
    lib_deps:
      - Xylopyrographer/LiteLED@3.0.1
      - bblanchon/ArduinoJson@6.21.3 # Required to parse the MAC array
  on_boot:
    - priority: 550
      then:
        - lambda: |-
            led_set_bright_lux_threshold(id(led_bright_lux_max));
    - priority: 600
      then:
        - globals.set: { id: motion_enabled, value: 'true' }
        - lambda: |-
            led_init();
            led_play_boot();

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

logger:
  baud_rate: 115200

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "PresenceNode_${device_id}_Setup"
    password: ""

captive_portal:

mqtt:
  broker: homeassistant.local
  username: !secret mqtt_username
  password: !secret mqtt_password
  discovery: false
  # Device list: esp_click/device/<mac> handled in espnow_handler.h (needs topic + payload).
  on_connect:
    - mqtt.publish:
        topic: "esp_click/request_macs"
        payload: "fetch"
    - lambda: |-
        mqtt_ensure_device_sync_subscription();

# [Keep the rest of your ESPHome YAML unchanged (espnow, I2C, sensors, scripts, buttons)]

espnow:
  auto_add_peer: true
  
  on_broadcast:
    then:
      - lambda: |-
          handle_espnow_packet(info.src_addr, data, size);

  on_receive:
    then:
      - lambda: |-
          handle_espnow_packet(info.src_addr, data, size);
          
globals:
  - id: motion_enabled
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: led_bright_lux_max
    type: float
    restore_value: true
    initial_value: "10.0"

interval:
  - interval: 12ms
    then:
      - lambda: |-
          led_tick();

  - interval: 50ms
    then:
      - if:
          condition:
            lambda: return g_request_close_pairing_mode && pairing_mode_active;
          then:
            - lambda: |-
                g_request_close_pairing_mode = false;
            - switch.turn_off: pairing_mode_switch

# --------------------
# I2C
# --------------------
i2c:
  sda: GPIO8
  scl: GPIO9
  scan: true
  frequency: 100kHz

# ====================
# EVENT ENTITY
# ====================
event:
  - platform: template
    name: "Button"
    id: button_event
    device_class: button
    event_types:
      - single_press
      - double_press
      - long_press

# ====================
# LIGHT SENSOR
# ====================
sensor:
  - platform: veml7700
    address: 0x10
    update_interval: 1s
    ambient_light:
      name: "Ambient Light (internal)"
      id: ambient_light_lux_internal
      internal: true
      on_value:
        - lambda: |-
            led_set_ambient_lux(x);
    full_spectrum:
      name: "Full Spectrum Light (internal)"
      id: full_spectrum_lux_internal
      internal: true
    infrared:
      name: "Infrared Light (internal)"
      id: infrared_lux_internal
      internal: true
    actual_gain:
      name: "VEML7700 Gain"
    actual_integration_time:
      name: "VEML7700 Integration Time"
  - platform: template
    name: "Ambient Light (Lux)"
    id: ambient_light_lux
    icon: mdi:brightness-6
    unit_of_measurement: lx
    device_class: illuminance
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 30s
    lambda: |-
      return id(ambient_light_lux_internal).state;
  - platform: template
    name: "Full Spectrum Light"
    id: full_spectrum_lux
    icon: mdi:brightness-7
    unit_of_measurement: lx
    device_class: illuminance
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 30s
    lambda: |-
      return id(full_spectrum_lux_internal).state;
  - platform: template
    name: "Infrared Light"
    id: infrared_lux
    icon: mdi:brightness-5
    unit_of_measurement: lx
    device_class: illuminance
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 30s
    lambda: |-
      return id(infrared_lux_internal).state;

# ====================
# SCRIPTS
# ====================
script:
  - id: pairing_mode_timer
    mode: restart
    then:
      - switch.turn_on: pairing_mode_switch
      - logger.log: "Pairing mode activated. Waiting for devices..."
      - delay: 60s
      - switch.turn_off: pairing_mode_switch
      - logger.log: "Pairing mode timed out and closed."

  # NEW: Continuous pulsing loop for the Pairing LED
  - id: pairing_led_loop
    mode: restart
    then:
      - while:
          condition:
            switch.is_on: pairing_mode_switch
          then:
            - lambda: |-
                static const LedColor magenta = {255, 0, 255};
                led_play_reverse_center_wave(&magenta, 1);
            # Wait 2 seconds before firing the next wave (acts like a heartbeat pulse)
            - delay: 2s

# ====================
# SWITCHES
# ====================
switch:
  - platform: template
    name: "Motion Enabled"
    id: motion_enabled_switch
    lambda: |-
      return id(motion_enabled);
    turn_on_action:
      - globals.set: { id: motion_enabled, value: 'true' }
      - lambda: |-
          led_play_feedback_motion_on();
    turn_off_action:
      - globals.set: { id: motion_enabled, value: 'false' }
      - binary_sensor.template.publish:
          id: radar_presence
          state: OFF
      - lambda: |-
          led_play_feedback_motion_off();
  # ====================
  # ESP-NOW PAIRING MODE SWITCH
  # ====================
  - platform: template
    name: "ESP-NOW Pairing Mode"
    id: pairing_mode_switch
    icon: mdi:bluetooth-connect
    optimistic: true
    turn_on_action:
      - lambda: 'pairing_mode_active = true;'
      - lambda: 'led_play_pairing();'
    turn_off_action:
      - lambda: 'pairing_mode_active = false;'
      - script.stop: pairing_mode_timer
      - if:
          condition:
            lambda: return !g_pairing_close_skip_red_led;
          then:
            - lambda: |-
                static const LedColor red = {255, 0, 0};
                led_play_reverse_center_wave(&red, 1);
      - lambda: 'g_pairing_close_skip_red_led = false;'

# ====================
# NUMBERS (HA)
# ====================
number:
  - platform: template
    name: "LED full brightness at (lux)"
    id: led_bright_lux_number
    entity_category: config
    icon: mdi:white-balance-sunny
    unit_of_measurement: lx
    min_value: 0.5
    max_value: 2000
    step: 0.5
    mode: box
    lambda: |-
      return id(led_bright_lux_max);
    set_action:
      - lambda: |-
          led_set_bright_lux_threshold(x);
      - globals.set:
          id: led_bright_lux_max
          value: !lambda |-
            return g_led_bright_lux_threshold;

# ====================
# BUTTONS
# ====================
button:
  - platform: template
    name: "Clear All Paired Devices"
    id: clear_macs_button
    icon: mdi:delete-sweep
    entity_category: config
    on_press:
      - lambda: |-
          #ifdef USE_MQTT
          clear_all_paired_devices_mqtt();
          #endif
      - logger.log: "Published empty device list to MQTT broker."


# ====================
# BINARY SENSORS
# ====================
binary_sensor:
  - platform: template
    id: radar_presence
    name: "Radar Presence"
    device_class: occupancy
    lambda: |-
      return id(motion_enabled) && digitalRead(7);

  # PUSH BUTTON
  - platform: gpio
    pin:
      number: GPIO3
      mode: INPUT_PULLUP
      inverted: true
    internal: true
    name: "Push Button"

    on_multi_click:
      - timing:
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for at least 200ms
        then:
          - if:
              condition:
                switch.is_off: pairing_mode_switch
              then:
                - script.execute: pairing_mode_timer
              else:
                - switch.turn_off: pairing_mode_switch
      - timing:
          - ON for 50ms to 350ms
          - OFF for at least 200ms
        then:
          - event.trigger:
              id: button_event
              event_type: single_press
          - lambda: |-
              led_play_feedback_single();
          - logger.log: "Event Fired: Single Press"

      - timing:
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for at least 200ms
        then:
          - event.trigger:
              id: button_event
              event_type: double_press
          - lambda: |-
              led_play_feedback_double();
          - logger.log: "Event Fired: Double Press"

      - timing:
          - ON for at least 500ms
        then:
          - globals.set:
              id: motion_enabled
              value: !lambda 'return !id(motion_enabled);'
          - if:
              condition:
                lambda: 'return !id(motion_enabled);'
              then:
                - binary_sensor.template.publish:
                    id: radar_presence
                    state: OFF
          - event.trigger:
              id: button_event
              event_type: long_press
          - lambda: |-
              if (id(motion_enabled)) {
                led_play_feedback_motion_on();
              } else {
                led_play_feedback_motion_off();
              }
          - logger.log:
              format: "Motion Enabled now: %s"
              args: ['id(motion_enabled) ? "TRUE" : "FALSE"']