esphome:
  name: presence_node_${device_id}
  friendly_name: PresenceNode_${device_id}
  includes:
    - led_engine.h
  platformio_options:
    lib_deps:
      - Xylopyrographer/LiteLED@3.0.1
  on_boot:
    priority: 600
    then:
      - globals.set: { id: motion_enabled, value: 'true' }
      - lambda: |-
          led_init();
          led_play_boot();

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

logger:
  baud_rate: 115200

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "PresenceNode_${device_id}_Setup"
    password: ""

captive_portal:

# Enables Home Assistant Bluetooth Proxy
bluetooth_proxy:
  active: true
espnow:
  auto_add_peer: true
  
  # 1. CATCH THE FALLBACK BROADCAST SWEEP
  on_broadcast:
    then:
      - lambda: |-
          // 1. Recreate the Enums to ensure memory alignment matches
          enum MessageType { BUTTON_PRESS, BATTERY_STATUS };
          enum PressEvent { SINGLE_PRESS, DOUBLE_PRESS, LONG_PRESS };
          enum BatteryStatus { BATTERY_OK, BATTERY_LOW }; // Adjust to match your sender's enum if different
          
          // 2. Define the new, larger Message struct
          struct __attribute__((packed)) Message {
            uint32_t counter;
            int deviceId;
            int entityId;
            MessageType type;
            union {
              struct { PressEvent event; } buttonPress;
              struct { int level; BatteryStatus status; } batteryLevel;
            } data;
          };

          // 3. Define the Ack struct
          struct __attribute__((packed)) AckMessage {
            uint32_t counter;
            bool success;
          };

          // 4. Check for the new size
          if (size == sizeof(Message)) {
            auto msg = (const Message *)data;
            
            // Log the specific event data based on message type
            if (msg->type == BUTTON_PRESS) {
              ESP_LOGI("espnow_debug", "BROADCAST: Entity %d Pressed! Event: %d, Counter: %lu", 
                       msg->entityId, msg->data.buttonPress.event, msg->counter);
            }
            
            // Trigger your Home Assistant Event here if needed
            // if (msg->entityId == 1) { id(espnow_btn_1).trigger("single_press"); }
            
            AckMessage ack_msg;
            ack_msg.counter = msg->counter;
            ack_msg.success = true;
            esp_err_t result = esp_now_send(info.src_addr, (uint8_t *)&ack_msg, sizeof(ack_msg));
            if (result == ESP_OK) ESP_LOGD("espnow_debug", "ACK fired back!");
          } else {
            ESP_LOGD("espnow_debug", "Ignored packet of size %d (Expected %d)", size, sizeof(Message));
          }

  # 2. CATCH THE TARGETED UNICAST (FAST PATH)
  on_receive:
    then:
      - lambda: |-
          // 1. Recreate the Enums
          enum MessageType { BUTTON_PRESS, BATTERY_STATUS };
          enum PressEvent { SINGLE_PRESS, DOUBLE_PRESS, LONG_PRESS };
          enum BatteryStatus { BATTERY_OK, BATTERY_LOW };
          
          // 2. Define the new, larger Message struct
          struct __attribute__((packed)) Message {
            uint32_t counter;
            int deviceId;
            int entityId;
            MessageType type;
            union {
              struct { PressEvent event; } buttonPress;
              struct { int level; BatteryStatus status; } batteryLevel;
            } data;
          };

          // 3. Define the Ack struct
          struct __attribute__((packed)) AckMessage {
            uint32_t counter;
            bool success;
          };

          // 4. Check for the new size
          if (size == sizeof(Message)) {
            auto msg = (const Message *)data;
            
            // Log the specific event data
            if (msg->type == BUTTON_PRESS) {
              ESP_LOGI("espnow_debug", "UNICAST: Entity %d Pressed! Event: %d, Counter: %lu", 
                       msg->entityId, msg->data.buttonPress.event, msg->counter);
            }
            
            // Trigger your Home Assistant Event here if needed
            
            AckMessage ack_msg;
            ack_msg.counter = msg->counter;
            ack_msg.success = true;
            esp_err_t result = esp_now_send(info.src_addr, (uint8_t *)&ack_msg, sizeof(ack_msg));
            if (result == ESP_OK) ESP_LOGD("espnow_debug", "ACK fired back!");
          } else {
            ESP_LOGD("espnow_debug", "Ignored packet of size %d (Expected %d)", size, sizeof(Message));
          }
          
globals:
  - id: motion_enabled
    type: bool
    restore_value: no
    initial_value: 'true'

interval:
  - interval: 12ms
    then:
      - lambda: |-
          led_tick();

# --------------------
# I2C
# --------------------
i2c:
  sda: GPIO8
  scl: GPIO9
  scan: true
  frequency: 100kHz

# ====================
# EVENT ENTITY
# ====================
event:
  - platform: template
    name: "Button"
    id: button_event
    device_class: button
    event_types:
      - single_press
      - double_press
      - long_press

# ====================
# LIGHT SENSOR
# ====================
sensor:
  - platform: veml7700
    address: 0x10
    update_interval: 30s
    ambient_light:
      name: "Ambient Light (Lux)"
    full_spectrum:
      name: "Full Spectrum Light"
    infrared:
      name: "Infrared Light"
    actual_gain:
      name: "VEML7700 Gain"
    actual_integration_time:
      name: "VEML7700 Integration Time"

# ====================
# MOTION ENABLE SWITCH (HA)
# ====================
switch:
  - platform: template
    name: "Motion Enabled"
    id: motion_enabled_switch
    lambda: |-
      return id(motion_enabled);
    turn_on_action:
      - globals.set: { id: motion_enabled, value: 'true' }
      - lambda: |-
          // Optional: LED feedback when motion enabled via HA
          led_play_feedback_motion_on();
    turn_off_action:
      - globals.set: { id: motion_enabled, value: 'false' }
      - binary_sensor.template.publish:
          id: radar_presence
          state: OFF
      - lambda: |-
          // LED feedback when motion disabled via HA
          led_play_feedback_motion_off();


# ====================
# BINARY SENSORS
# ====================
binary_sensor:
  - platform: template
    id: radar_presence
    name: "Radar Presence"
    device_class: occupancy
    lambda: |-
      return id(motion_enabled) && digitalRead(7);

  # PUSH BUTTON
  - platform: gpio
    pin:
      number: GPIO3
      mode: INPUT_PULLUP
      inverted: true
    internal: true
    name: "Push Button"

    on_multi_click:

      # SINGLE
      - timing:
          - ON for 50ms to 350ms
          - OFF for at least 200ms
        then:
          - event.trigger:
              id: button_event
              event_type: single_press
          - lambda: |-
              led_play_feedback_single();
          - logger.log: "Event Fired: Single Press"

      # DOUBLE
      - timing:
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
        then:
          - event.trigger:
              id: button_event
              event_type: double_press
          - lambda: |-
              led_play_feedback_double();
          - logger.log: "Event Fired: Double Press"

      # LONG  ← YOUR TOGGLE
      - timing:
          - ON for at least 500ms
        then:

          # toggle stored state
          - globals.set:
              id: motion_enabled
              value: !lambda 'return !id(motion_enabled);'

          # if disabled → force radar OFF
          - if:
              condition:
                lambda: 'return !id(motion_enabled);'
              then:
                - binary_sensor.template.publish:
                    id: radar_presence
                    state: OFF

          # fire HA event
          - event.trigger:
              id: button_event
              event_type: long_press

          # LED feedback
          - lambda: |-
              if (id(motion_enabled)) {
                led_play_feedback_motion_on();
              } else {
                led_play_feedback_motion_off();
              }

          - logger.log:
              format: "Motion Enabled now: %s"
              args: ['id(motion_enabled) ? "TRUE" : "FALSE"']
