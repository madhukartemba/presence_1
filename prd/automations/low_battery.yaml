alias: "ESP Click: Low Battery Alert"
triggers:
  - topic: esp_click/+/battery_level
    trigger: mqtt
conditions:
  - condition: template
    value_template: |
      {{ trigger.payload | float(100) <= 30 }}
actions:
  - variables:
      mac: "{{ trigger.topic.split('/')[1] }}"
      matched_entity: |
        {{ states.sensor 
           | selectattr('entity_id', 'search', 'esp_click_' ~ mac) 
           | map(attribute='entity_id') 
           | first | default('') }}
      ha_device_name: |
        {% if matched_entity %}
          {% set d_id = device_id(matched_entity) %}
          {{ device_attr(d_id, 'name_by_user') | default(device_attr(d_id, 'name'), true) | default(mac, true) }}
        {% else %}
          {{ mac }}
        {% endif %}
  - action: notify.notify
    data:
      title: "ESP Click: Low Battery 🪫"
      message: |
        {{ ha_device_name }} has dropped to {{ trigger.payload }}%.
  - delay: "01:00:00"
mode: single
